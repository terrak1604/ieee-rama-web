<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mantenimiento | IEEE Rama Estudiantil UNMSM</title>
  <link rel="icon" type="image/png" href="/images/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #001f3f; color: #fff;
      font-family: 'Inter', sans-serif; text-align: center; padding: 2rem;
    }
    .card {
      max-width: 520px; width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(0,153,214,0.3);
      border-radius: 16px; padding: 3rem 2.5rem;
    }
    .logo { font-family: 'Orbitron', monospace; font-size: 2.5rem; font-weight: 700; color: #0099d6; margin-bottom: 0.25rem; }
    .sub { font-size: 0.8rem; color: rgba(255,255,255,0.5); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 2.5rem; }
    .icon { font-size: 3rem; margin-bottom: 1.5rem; }
    h1 { font-family: 'Orbitron', monospace; font-size: 1.4rem; font-weight: 700; margin-bottom: 1rem; color: #0099d6; }
    p { font-size: 0.95rem; color: rgba(255,255,255,0.7); line-height: 1.7; }
    .admin-link {
      display: inline-block; margin-top: 2rem;
      padding: 0.6rem 1.5rem; border-radius: 8px;
      background: rgba(0,153,214,0.15); border: 1px solid rgba(0,153,214,0.3);
      color: #0099d6; text-decoration: none; font-size: 0.85rem;
      transition: background 0.2s;
    }
    .admin-link:hover { background: rgba(0,153,214,0.3); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">IEEE</div>
    <div class="sub">Rama Estudiantil · UNMSM</div>
    <div class="icon">🔧</div>
    <h1>Sitio en Mantenimiento</h1>
    <p>
      Estamos realizando mejoras en el portal para brindarte una mejor experiencia.<br>
      Por favor, vuelve en unos momentos. ¡Gracias por tu paciencia!
    </p>
    <a href="/admin/login.html" class="admin-link">Acceso Administrativo</a>
  </div>
</body>
</html>
