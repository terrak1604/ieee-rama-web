<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Admin IEEE Rama</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin-styles.css">
</head>
<body>
  <div class="particles-bg"></div>
  
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <h1>IEEE Rama Estudiantil</h1>
        <p>Portal de Administración</p>
      </div>

      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="director@ieee.edu.pe" 
            required
          >
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="••••••••" 
            required
          >
        </div>

        <div id="error" class="error-message hidden"></div>

        <button type="submit" class="btn-primary">Ingresar</button>
      </form>

      <div class="login-footer">
        <p>¿No tienes cuenta? Contacta al director de rama</p>
      </div>
    </div>
  </div>

  <script src="admin.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', handleLogin);

    async function handleLogin(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('error');

      try {
        const response = await fetch(`${API_BASE_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          errorDiv.textContent = data.error || 'Error en login';
          errorDiv.classList.remove('hidden');
          return;
        }



        // Guardar token y usuario
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));

        // Redirigir al dashboard
        window.location.href = 'dashboard.html';
      } catch (err) {
        console.error("Login fetch error:", err);
        errorDiv.textContent = 'Error de conexión: ' + err.message;
        errorDiv.classList.remove('hidden');
      }
    }
  </script>
</body>
</html>
