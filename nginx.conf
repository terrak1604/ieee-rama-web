# Rate limit zone for login endpoint
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

# Gzip compression
gzip on;
gzip_vary on;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
gzip_min_length 1024;

server {
    listen 80;
    server_name ieee-unmsm.org www.ieee-unmsm.org;

    # Redirect HTTP to HTTPS (cuando tengamos certbot)
    # return 301 https://$host$request_uri;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Bloqueo de rutas sensibles
    location ~ /\.(env|git) { deny all; return 404; }
    location ~ \.(sqlite|sqlite-journal|db)$ { deny all; return 404; }
    location ~ ^/(backend|node_modules|tests)/ { deny all; return 404; }

    # API proxy con rate limit en login
    location = /api/auth/login {
        limit_req zone=login_limit burst=3 nodelay;
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploads servidos directo del volumen montado
    location /uploads/ {
        alias /var/www/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Cache largo para CSS/JS/imágenes
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|webp|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # HTML sin cache (siempre fresco)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, must-revalidate";
        try_files $uri =404;
    }

    # Multi-página: extensión .html implícita, fallback 404
    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }
}
