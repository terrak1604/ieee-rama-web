<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <script>if(localStorage.getItem('theme')=='dark')document.documentElement.setAttribute('data-theme','dark');</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Open Graph dinámico (se actualiza vía JS) -->
  <meta id="og-title"       property="og:title"       content="Capítulo IEEE | Rama Estudiantil UNMSM">
  <meta id="og-description" property="og:description" content="Información detallada del capítulo IEEE UNMSM.">
  <meta id="og-image"       property="og:image"       content="/images/default-meta.jpg">
  <meta id="og-url"         property="og:url"         content="">
  <meta property="og:type"      content="website">
  <meta property="og:site_name" content="IEEE Rama Estudiantil UNMSM">
  <meta name="twitter:card" content="summary_large_image">
  <title id="page-title">Capítulo | IEEE Rama Estudiantil UNMSM</title>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=18.0">
  <style>
    /* ── Detalle de capítulo ── */
    .cap-detail-hero {
      background: var(--gradient-main);
      padding: var(--space-9) 0 var(--space-7);
      margin-top: 70px;
    }
    .cap-detail-hero .container {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: var(--space-6);
      align-items: center;
    }
    .cap-detail-logo {
      width: 120px; height: 120px;
      border-radius: 50%;
      object-fit: contain;
      background: rgba(255,255,255,0.1);
      border: 3px solid rgba(255,255,255,0.3);
      padding: 12px;
    }
    .cap-detail-logo-placeholder {
      width: 120px; height: 120px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: 3px solid rgba(255,255,255,0.3);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Orbitron', sans-serif;
      font-size: var(--text-2xl); font-weight: 900;
      color: #ffffff;
    }
    .cap-detail-meta { color: rgba(200,228,255,0.85); }
    .cap-detail-meta h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.6rem, 4vw, var(--text-3xl));
      color: #ffffff; margin-bottom: var(--space-2);
    }
    .cap-detail-sigla {
      display: inline-block;
      background: rgba(255,255,255,0.15);
      color: #ffffff;
      padding: var(--space-1) var(--space-4);
      border-radius: 50px;
      font-size: var(--text-sm); font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      margin-bottom: var(--space-3);
    }
    .cap-detail-desc {
      font-size: var(--text-base);
      max-width: 680px;
      color: rgba(220,235,255,0.9);
      line-height: 1.7;
    }
    .cap-detail-actions {
      display: flex; gap: var(--space-3); flex-wrap: wrap;
      margin-top: var(--space-5);
    }

    /* ── Cuerpo ── */
    .cap-detail-body { padding: var(--space-8) 0; }
    .cap-detail-grid {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: var(--space-6);
      align-items: start;
    }
    .cap-detail-main h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: var(--text-xl);
      color: var(--ieee-dark); margin-bottom: var(--space-4);
    }
    .cap-detail-main p {
      font-size: var(--text-base);
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: var(--space-4);
    }

    /* ── Sidebar ── */
    .cap-sidebar-card {
      background: #ffffff;
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      padding: var(--space-5);
      margin-bottom: var(--space-4);
    }
    .cap-sidebar-card h3 {
      font-size: var(--text-sm); font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--ieee-blue);
      margin-bottom: var(--space-4);
      padding-bottom: var(--space-2);
      border-bottom: 2px solid var(--border-glow);
    }
    .cap-info-row {
      display: flex; align-items: center; gap: var(--space-3);
      padding: var(--space-2) 0;
      font-size: var(--text-sm);
      color: var(--text-secondary);
      border-bottom: 1px solid #f0f4f8;
    }
    .cap-info-row:last-child { border-bottom: none; }
    .cap-info-row strong { color: var(--text-primary); min-width: 80px; }
    .cap-social-links { display: flex; flex-wrap: wrap; gap: var(--space-2); }
    .cap-social-link {
      display: inline-flex; align-items: center; gap: var(--space-2);
      background: var(--bg-body);
      border: 1px solid var(--border-glow);
      color: var(--ieee-blue);
      padding: var(--space-2) var(--space-3);
      border-radius: 6px;
      font-size: var(--text-sm); font-weight: 500;
      text-decoration: none;
      transition: var(--transition);
    }
    .cap-social-link:hover { background: var(--ieee-blue); color: #ffffff; }

    /* ── Contenido reciente del capítulo ── */
    .cap-reciente-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--space-4);
      margin-top: var(--space-5);
    }

    /* ── Error / 404 ── */
    .cap-not-found {
      text-align: center; padding: var(--space-9) 0;
    }
    .cap-not-found h2 { color: var(--ieee-dark); margin-bottom: var(--space-3); }
    .cap-not-found p  { color: var(--text-muted); margin-bottom: var(--space-5); }

    @media (max-width: 900px) {
      .cap-detail-grid { grid-template-columns: 1fr; }
      .cap-detail-hero .container { grid-template-columns: 1fr; text-align: center; }
      .cap-detail-actions { justify-content: center; }
    }
  </style>
</head>
<body data-page="capitulo-detalle">

        <div class="nav-logo-sub">Rama Estudiantil · UNMSM</div>
      </div>
    </a>
    <ul class="nav-links" id="nav-links">
      <li><a href="/">Inicio</a></li>
      <li><a href="/capitulos" class="active">Capítulos</a></li>
      <li><a href="/noticias">Noticias</a></li>

      <li><a href="/galeria">Galería</a></li>
      <li><a href="/contacto">Contacto</a></li>
    </ul>
    <div class="nav-social">
      <a href="/admin/login.html" class="nav-admin-link" title="Panel administrativo" aria-label="Panel administrativo">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

      <button class="dark-toggle" id="darkToggle" title="Modo oscuro" aria-label="Cambiar tema">

    <button class="nav-hamburger" id="nav-hamburger" aria-label="Menú móvil" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <main id="capitulo-detail-root">
    <!-- Se rellena dinámicamente por JS -->
    <section class="detail-skeleton">
      <div class="cap-detail-hero">
        <div class="container">
          <div class="skeleton cap-detail-logo-placeholder" style="background: rgba(255,255,255,0.15);"></div>
          <div style="flex:1">
            <div class="skeleton" style="height:14px;width:100px;margin-bottom:12px;"></div>
            <div class="skeleton" style="height:36px;width:60%;margin-bottom:12px;"></div>
            <div class="skeleton" style="height:14px;width:80%;"></div>
          </div>

    </section>
  </main>

  <footer style="background:var(--ieee-dark);color:rgba(200,225,255,0.7);text-align:center;padding:var(--space-5) 0;margin-top:var(--space-8);font-size:var(--text-sm);">
    <div class="container">
      <p>© 2026 IEEE Rama Estudiantil UNMSM · Todos los derechos reservados</p>
    </div>
  </footer>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script defer src="js/main.js?v=18.0"></script>
  <!-- Patch: corrige mapeo de campos API y renderizado del hero con portada -->
  <script defer src="js/capitulo-detalle-patch.js"></script>
</body>
</html>
