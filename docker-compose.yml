services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ieee_backend
    expose:
      - "3000"   # solo interno, no expuesto al host
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET requerido en .env de raíz}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://ieee-unmsm.org}
      DB_PATH: /data/database.sqlite
    volumes:
      - backend_data:/data
      - backend_uploads:/usr/src/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped
    networks:
      - ieee_net

  frontend:
    image: nginx:alpine
    container_name: ieee_frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Solo archivos públicos del frontend, NO toda la repo
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./capitulos.html:/usr/share/nginx/html/capitulos.html:ro
      - ./noticias.html:/usr/share/nginx/html/noticias.html:ro
      - ./proyectos.html:/usr/share/nginx/html/proyectos.html:ro
      - ./concursos.html:/usr/share/nginx/html/concursos.html:ro
      - ./galeria.html:/usr/share/nginx/html/galeria.html:ro
      - ./contacto.html:/usr/share/nginx/html/contacto.html:ro
      - ./calendario.html:/usr/share/nginx/html/calendario.html:ro
      - ./revista.html:/usr/share/nginx/html/revista.html:ro
      - ./resultados.html:/usr/share/nginx/html/resultados.html:ro
      - ./css:/usr/share/nginx/html/css:ro
      - ./js:/usr/share/nginx/html/js:ro
      - ./data:/usr/share/nginx/html/data:ro
      - ./images:/usr/share/nginx/html/images:ro
      - ./admin:/usr/share/nginx/html/admin:ro
      # Uploads compartidos con el backend
      - backend_uploads:/var/www/uploads:ro
      # Certificados SSL (se llenan con certbot)
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    restart: unless-stopped
    networks:
      - ieee_net

volumes:
  backend_data:
  backend_uploads:

networks:
  ieee_net:
    driver: bridge
