<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Open Graph dinámico (se actualiza vía JS) -->
  <meta id="og-title"       property="og:title"       content="Contenido | IEEE Rama Estudiantil UNMSM">
  <meta id="og-description" property="og:description" content="Artículo editorial de IEEE UNMSM.">
  <meta id="og-image"       property="og:image"       content="/images/default-meta.jpg">
  <meta id="og-url"         property="og:url"         content="">
  <meta property="og:type"      content="article">
  <meta property="og:site_name" content="IEEE Rama Estudiantil UNMSM">
  <meta name="twitter:card" content="summary_large_image">
  <title id="page-title">Artículo | IEEE Rama Estudiantil UNMSM</title>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── Artículo detalle ── */
    .article-hero {
      background: var(--gradient-main);
      padding: calc(70px + var(--space-7)) 0 var(--space-7);
      position: relative;
      overflow: hidden;
    }
    .article-hero-bg {
      position: absolute; inset: 0; z-index: 0;
      background-size: cover; background-position: center;
      filter: brightness(0.3);
    }
    .article-hero .container { position: relative; z-index: 1; max-width: 800px; }

    .article-type-badge {
      display: inline-flex; align-items: center; gap: var(--space-2);
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: #ffffff;
      padding: var(--space-1) var(--space-4);
      border-radius: 50px;
      font-size: var(--text-xs); font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      margin-bottom: var(--space-4);
    }
    .article-hero h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.5rem, 4vw, var(--text-3xl));
      color: #ffffff; line-height: 1.2;
      margin-bottom: var(--space-4);
      text-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    .article-meta-row {
      display: flex; flex-wrap: wrap; align-items: center;
      gap: var(--space-4);
      color: rgba(200,225,255,0.85);
      font-size: var(--text-sm);
    }
    .article-meta-item {
      display: flex; align-items: center; gap: var(--space-2);
    }

    /* ── Layout de artículo ── */
    .article-layout {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: var(--space-7);
      padding: var(--space-8) 0;
      max-width: 1100px;
      margin: 0 auto;
    }
    .article-body {
      background: #ffffff;
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      padding: var(--space-7);
    }
    .article-featured-img {
      width: 100%; border-radius: 10px;
      margin-bottom: var(--space-6);
      aspect-ratio: 16 / 9; object-fit: cover;
    }
    .article-content { font-size: var(--text-base); line-height: 1.8; color: var(--text-secondary); }
    .article-content h2 { color: var(--ieee-dark); margin: var(--space-6) 0 var(--space-3); font-size: var(--text-xl); }
    .article-content h3 { color: var(--ieee-blue); margin: var(--space-5) 0 var(--space-2); }
    .article-content p  { margin-bottom: var(--space-4); }
    .article-content ul, .article-content ol {
      padding-left: var(--space-6); margin-bottom: var(--space-4);
    }
    .article-content li { margin-bottom: var(--space-2); }
    .article-content blockquote {
      border-left: 4px solid var(--ieee-blue);
      padding: var(--space-3) var(--space-5);
      background: var(--bg-body);
      border-radius: 0 8px 8px 0;
      margin: var(--space-5) 0;
      color: var(--text-primary);
      font-style: italic;
    }

    /* ── Sidebar artículo ── */
    .article-sidebar > * { margin-bottom: var(--space-4); }
    .sidebar-card {
      background: #ffffff;
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      padding: var(--space-5);
    }
    .sidebar-card h3 {
      font-size: var(--text-sm); font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--ieee-blue);
      margin-bottom: var(--space-4);
      padding-bottom: var(--space-2);
      border-bottom: 2px solid var(--border-glow);
    }
    .sidebar-info-item {
      display: flex; align-items: flex-start; gap: var(--space-3);
      padding: var(--space-2) 0;
      font-size: var(--text-sm); color: var(--text-secondary);
      border-bottom: 1px solid #f0f4f8;
    }
    .sidebar-info-item:last-child { border-bottom: none; }
    .sidebar-info-item strong { color: var(--text-primary); min-width: 60px; }

    /* ── Compartir ── */
    .share-bar {
      display: flex; align-items: center; gap: var(--space-3);
      flex-wrap: wrap;
      margin-top: var(--space-6);
      padding-top: var(--space-4);
      border-top: 1px solid #e8f0f8;
    }
    .share-bar span { font-size: var(--text-sm); font-weight: 600; color: var(--text-muted); }
    .share-btn {
      display: inline-flex; align-items: center; gap: var(--space-2);
      padding: var(--space-2) var(--space-4);
      border-radius: 6px; font-size: var(--text-sm); font-weight: 500;
      text-decoration: none; cursor: pointer; border: none;
      transition: var(--transition);
    }
    .share-btn-copy  { background: var(--bg-body); color: var(--text-secondary); border: 1px solid #d1deeb; }
    .share-btn-copy:hover  { background: var(--ieee-blue); color: #ffffff; }
    .share-btn-wa    { background: #25d366; color: #ffffff; }
    .share-btn-wa:hover    { background: #1da851; }
    .share-btn-tw    { background: #1da1f2; color: #ffffff; }
    .share-btn-tw:hover    { background: #1a8cd8; }

    /* ── Chips de tipo ── */
    .type-noticia  { background: rgba(0,98,155,0.12);  color: var(--ieee-blue); }
    .type-proyecto { background: rgba(0,40,85,0.1);    color: var(--ieee-dark); }
    .type-evento   { background: rgba(240,180,41,0.15); color: #a06000; }

    /* ── Breadcrumb ── */
    .breadcrumb {
      font-size: var(--text-xs);
      color: rgba(200,225,255,0.7);
      margin-bottom: var(--space-4);
    }
    .breadcrumb a { color: rgba(200,225,255,0.85); text-decoration: none; }
    .breadcrumb a:hover { color: #ffffff; }
    .breadcrumb span { margin: 0 var(--space-2); }

    /* ── Error ── */
    .content-not-found { text-align: center; padding: var(--space-9) 0; }
    .content-not-found h2 { color: var(--ieee-dark); margin-bottom: var(--space-3); }
    .content-not-found p  { color: var(--text-muted); margin-bottom: var(--space-5); }

    @media (max-width: 900px) {
      .article-layout { grid-template-columns: 1fr; }
      .article-sidebar { order: -1; }
      .article-body { padding: var(--space-5); }
    }
  </style>
</head>
<body data-page="contenido-detalle">
  <div id="loader">
    <div class="loader-logo">IEEE</div>
    <p class="loader-text">Rama Estudiantil · UNMSM</p>
    <div class="loader-bar"><div class="loader-progress"></div></div>
  </div>
  <div id="particles-js"></div>

  <nav id="navbar" role="navigation" aria-label="Navegación principal">
    <a href="/" class="nav-brand" aria-label="Inicio IEEE UNMSM">
      <div>
        <div class="nav-logo-text">IEEE</div>
        <div class="nav-logo-sub">Rama Estudiantil · UNMSM</div>
      </div>
    </a>
    <ul class="nav-links" id="nav-links">
      <li><a href="/">Inicio</a></li>
      <li><a href="/capitulos">Capítulos</a></li>
      <li><a href="/noticias">Noticias</a></li>
      <li><a href="/proyectos">Proyectos</a></li>
      <li><a href="/concursos">Concursos</a></li>
      <li><a href="/revista">Revista</a></li>
      <li><a href="/galeria">Galería</a></li>
      <li><a href="/contacto">Contacto</a></li>
    </ul>
    <div class="nav-social">
      <a href="/admin/login.html" class="nav-admin-link" title="Panel administrativo" aria-label="Panel administrativo">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
      </a>
    </div>
    <button class="nav-hamburger" id="nav-hamburger" aria-label="Menú móvil" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <main id="contenido-detail-root">
    <!-- Skeleton inicial mientras carga -->
    <div class="article-hero">
      <div class="container">
        <div class="skeleton" style="height:22px;width:80px;border-radius:50px;margin-bottom:16px;background:rgba(255,255,255,0.15);"></div>
        <div class="skeleton" style="height:40px;width:70%;margin-bottom:12px;background:rgba(255,255,255,0.15);"></div>
        <div class="skeleton" style="height:14px;width:40%;background:rgba(255,255,255,0.1);"></div>
      </div>
    </div>
    <div class="container article-layout">
      <div class="article-body">
        <div class="skeleton skeleton-img"></div>
        <div class="skeleton skeleton-title"></div>
        <div class="skeleton skeleton-text"></div>
        <div class="skeleton skeleton-text"></div>
        <div class="skeleton skeleton-text short"></div>
      </div>
      <div class="article-sidebar">
        <div class="skeleton-card">
          <div class="skeleton skeleton-badge"></div>
          <div class="skeleton skeleton-text"></div>
          <div class="skeleton skeleton-text short"></div>
        </div>
      </div>
    </div>
  </main>

  <footer style="background:var(--ieee-dark);color:rgba(200,225,255,0.7);text-align:center;padding:var(--space-5) 0;margin-top:var(--space-8);font-size:var(--text-sm);">
    <div class="container">
      <p>© 2026 IEEE Rama Estudiantil UNMSM · Todos los derechos reservados</p>
    </div>
  </footer>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script defer src="js/main.js"></script>
</body>
</html>
